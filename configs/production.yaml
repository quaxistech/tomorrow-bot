# Tomorrow Bot — production режим (РЕАЛЬНЫЕ ДЕНЬГИ!)
# ВНИМАНИЕ: изменения в этом файле немедленно влияют на торговлю!
# Все параметры риска установлены строже, чем в других режимах.
# Требуется явное подтверждение перед применением.

trading:
  mode: production
  initial_capital: 9.80             # Фактический капитал ($9.80 USDT)

exchange:
  endpoint_rest: "https://api.bitget.com"
  endpoint_ws: "wss://ws.bitget.com/v2/ws/public"
  api_key_ref: "BITGET_API_KEY"
  api_secret_ref: "BITGET_API_SECRET"
  passphrase_ref: "BITGET_PASSPHRASE"
  timeout_ms: 3000

logging:
  level: "info"
  structured_json: true
  output_path: "logs/production.log"

metrics:
  enabled: true
  port: 9090
  path: "/metrics"

risk:
  max_position_notional: 196.0     # $9.80 × 20x = $196 max leveraged capital
  max_daily_loss_pct: 5.0          # 5% daily loss — conservative production limit
  max_drawdown_pct: 8.0            # Max drawdown 8%
  max_intraday_drawdown_pct: 5.0   # Intraday drawdown 5%
  kill_switch_enabled: true        # Safety net
  max_strategy_daily_loss_pct: 4.0        # Each strategy can lose up to 4%
  max_strategy_exposure_pct: 80.0         # 80% max exposure per strategy
  max_symbol_concentration_pct: 50.0      # Max 50% per symbol with 3 pairs
  max_same_direction_positions: 3         # One position per pair (3 pairs)
  regime_aware_limits_enabled: true     # ENABLE: trade only in good regimes
  stress_regime_scale: 0.30              # 30% in stress — enough for min notional on micro-account
  trending_regime_scale: 1.0             # Full size in trends
  chop_regime_scale: 0.50                # 50% in chop — reduces size but stays above $5 min notional
  max_trades_per_hour: 12                # Max 12 trades/hour — quality > quantity
  min_trade_interval_sec: 10.0           # 10 sec between trades — меньше fee drain
  max_adverse_excursion_pct: 5.0         # 5% adverse excursion w/ leverage
  max_realized_daily_loss_pct: 10.0      # Match daily loss limit
  utc_cutoff_hour: -1                    # Trade 24/7

# === Decision engine: HIGH thresholds = QUALITY trades only ===
decision:
  min_conviction_threshold: 0.68    # Строже: effective ~0.78-0.83 — только высококачественные входы
  conflict_dominance_threshold: 0.60 # Higher dominance needed
  max_acceptable_cost_bps: 300       # Allow higher cost for speed
  drawdown_boost_scale: 0.01         # Minimal drawdown penalty
  drawdown_max_boost: 0.05           # Cap drawdown boost low
  consecutive_loss_boost: 0.005      # Tiny loss-series penalty

# === Position management: HIGH WIN RATE scalping (90%+ target) ===
trading_params:
  atr_stop_multiplier: 2.0          # 2.0×ATR stop: R:R = 1.5/2.0 = 0.75 (tighter for micro)
  max_loss_per_trade_pct: 2.5       # 2.5% max loss per trade — tighter для micro-счёта
  breakeven_atr_threshold: 0.5      # Breakeven at 0.5×ATR — не слишком рано
  partial_tp_atr_threshold: 1.5     # Take profit at 1.5×ATR — фиксируем прибыль быстрее
  partial_tp_fraction: 0.70          # Close 70% at TP — keep runner for trend
  min_risk_reward_ratio: 0.50       # Minimum R:R 0.5 — reject bad setups
  max_hold_loss_minutes: 15         # 15 min emergency exit (дать больше времени)
  max_hold_absolute_minutes: 60     # 60 min max (для больших движений)
  order_cooldown_seconds: 30        # 30 sec between trades — меньше churning
  stop_loss_cooldown_seconds: 300   # 300 sec (5 мин) after stop loss — без revenge trading
  min_hold_minutes: 1               # 1 min min hold
  price_stop_loss_pct: 2.0          # Safety net: 2.0% price move = emergency exit (было 1.5%)
  quick_profit_min_hold_seconds: 30  # 30 сек — фиксируем быструю прибыль (default 60)
  quick_profit_fee_multiplier: 3.0   # 3× fees = порог quick exit (default 5.0)
  # Hedge Recovery: открыть встречную позицию при глубоком убытке
  hedge_recovery_enabled: true       # Включить хеджирование
  hedge_trigger_loss_pct: 1.5        # Активировать при убытке > 1.5% капитала
  hedge_min_hold_seconds: 30         # Не хеджировать первые 30 сек
  hedge_max_hold_minutes: 5          # Максимум 5 мин на хедж
  hedge_profit_close_fee_mult: 2.0   # Закрыть обе когда net PnL > 2× комиссий

pair_selection:
  mode: auto                       # Auto: сканер выбирает лучшие пары и ротирует
  symbols: ""                      # Пусто: сканер сам найдёт
  top_n: 1                         # 1 пара — весь капитал на одну позицию (микро-счёт)
  min_volume_usdt: 5000000         # $5M+ volume — покрывает ~50-80 пар (ранее $30M = только ~15)
  max_spread_bps: 20               # 20bps max spread (стандарт для скальпинга, Cartea §4.3)
  rotation_interval_hours: 2       # Ротация каждые 2ч — чаще ищет свежие тренды
  blacklist: "BTCUSDT,ETHUSDT,XAGUSDT,XAUUSDT"     # BTC/ETH: too expensive; XAG/XAU: commodities, low vol = always compression
  # Futures bidirectional scoring: bearish trends score equally (short = profit)
  scorer_futures_mode: true
  scorer_filter_min_change_24h: -20.0    # Allow coins dropping up to 20% (amazing for short)
  scorer_negative_change_penalty: 1.0    # NO penalty for falling coins in futures
  scorer_steady_gainer_min: 2.0          # 2-10% absolute movement = ideal
  scorer_steady_gainer_max: 10.0

# ── Execution Alpha: AGGRESSIVE execution for scalping ────────────────────────
execution_alpha:
  max_spread_bps_passive: 25.0          # Accept wider spreads
  max_spread_bps_any: 80.0              # Very tolerant
  adverse_selection_threshold: 0.80     # Relaxed: accept more trades
  urgency_passive_threshold: 0.3        # Lower bar for passive
  urgency_aggressive_threshold: 0.5     # Lower bar for aggressive (more market orders)
  large_order_slice_threshold: 0.20     # Our orders are tiny
  # VPIN
  vpin_toxic_threshold: 0.95            # XRP VPIN ranges 0.90-0.93 normally
  vpin_weight: 0.20                     # Less weight on VPIN
  # Order book imbalance
  imbalance_favorable_threshold: 0.15   # Lower bar
  imbalance_unfavorable_threshold: 0.50 # Higher tolerance
  # Limit price
  use_weighted_mid_price: true
  limit_price_passive_bps: 5.0          # Wider limit offset
  # Urgency
  urgency_cusum_boost: 0.25             # Higher urgency boost
  urgency_tod_weight: 0.05              # Less time-of-day effect
  # Fill probability
  min_fill_probability_passive: 0.15    # Lower bar
  # PostOnly (maker fee savings)
  postonly_spread_threshold_bps: 8.0    # Wider threshold
  postonly_urgency_max: 0.40
  postonly_adverse_max: 0.40

# ── Opportunity Cost: USDT-M futures scalping gating ────────────────────────
# Научные основания:
#   - Almgren & Chriss 2001: edge > execution cost для положительного ожидания
#   - Hull 2018: margin reserves, concentration limits для фьючерсов
#   - Thorp 2006: drawdown scaling (half-Kelly approach)
#   - Markowitz MPT: диверсификация по инструментам и стратегиям
opportunity_cost:
  min_net_expected_bps: 1.0              # > avg half-spread (~0.5 bps на BTCUSDT)
  execute_min_net_bps: 3.0               # ~3× half-spread: cost-to-edge ratio 1:3
  high_exposure_threshold: 0.70          # 70% margin util → 30% reserve для maintenance
  high_exposure_min_conviction: 0.60     # Высокий порог при загрузке капитала
  max_symbol_concentration: 1.00         # Single symbol mode: 100% on one pair
  max_strategy_concentration: 1.00       # Single-strategy prod: no blocking
  capital_exhaustion_threshold: 0.85     # 15% buffer для maintenance margin
  weight_conviction: 0.35               # Главный драйвер composite score
  weight_net_edge: 0.35                 # Чистый edge — второй драйвер
  weight_capital_efficiency: 0.15       # Вторичный фактор
  weight_urgency: 0.15                  # Вторичный фактор
  conviction_to_bps_scale: 100.0        # conviction 1.0 → 100 bps (leveraged scalp returns)
  upgrade_min_edge_advantage_bps: 5.0   # > 2× round-trip cost (~4 bps maker fees)
  drawdown_penalty_scale: 0.30          # +0.30 к порогу за каждые 5% drawdown
  consecutive_loss_penalty: 0.015       # +0.015 за каждый consecutive loss

# ── Regime Classification ─────────────────────────────────────────────────────
# Настройки классификатора рыночных режимов: пороги, гистерезис, политика
regime:
  # Тренд
  trend_adx_strong: 30.0            # ADX выше этого = сильный тренд
  trend_adx_weak_min: 18.0          # Нижняя граница слабого тренда
  trend_adx_weak_max: 30.0          # Верхняя граница слабого тренда
  trend_rsi_bias: 55.0              # RSI выше 55 = бычий, ниже 45 = медвежий (Wilder 1978, C. Brown 1999)

  # Возврат к среднему
  mr_rsi_overbought: 70.0           # RSI порог перекупленности
  mr_rsi_oversold: 30.0             # RSI порог перепроданности
  mr_adx_max: 25.0                  # Макс ADX для mean-reversion

  # Волатильность
  vol_bb_expansion: 0.06            # BB bandwidth для расширения волатильности
  vol_bb_compression: 0.015          # BB bandwidth для сжатия (was 0.02 — less strict)
  vol_atr_expansion: 0.02           # Нормализованный ATR для расширения
  vol_adx_compression_max: 15.0     # Макс ADX для компрессии (was 20 — allow weak trends)

  # Стресс / аномалии
  stress_rsi_extreme_high: 95.0     # RSI аномально высокий (крипто: 85-95 — нормальный тренд)
  stress_rsi_extreme_low: 5.0       # RSI аномально низкий (крипто: 5-15 — нормальная коррекция)
  stress_obv_extreme: 3.0           # OBV нормализованный — аномалия (2.0 слишком чувствительно)
  stress_aggressive_flow: 0.75      # Порог токсичного потока
  stress_spread_toxic_bps: 15.0     # Spread токсичности (bps)
  stress_book_instability: 0.6      # Нестабильность книги ордеров
  stress_spread_bps: 30.0           # Spread стресса (bps)
  stress_liquidity_ratio: 0.3       # Дисбаланс книги: ratio < 0.3 = перекос ≥ 3.3:1 (Cont et al. 2010)

  # Chop / боковик
  chop_adx_max: 18.0                # ADX ниже этого = Chop

  # Гистерезис / переходная политика
  transition_confirmation_ticks: 3  # Тиков для подтверждения смены режима
  transition_min_confidence: 0.55   # Мин confidence для смены
  transition_dwell_ticks: 5         # Мин тиков в режиме перед сменой

  # Уверенность / стабильность
  confidence_base: 0.5              # Базовая уверенность
  confidence_data_quality_weight: 0.2
  confidence_max_indicators: 12     # 12 реально используемых индикаторов
  confidence_anomaly: 0.9
  stability_same_regime: 0.9
  stability_first_classification: 0.5

# ── World Model v2 ────────────────────────────────────────────────────────────
# Мировая модель: классификация состояний рынка, хрупкость, пригодность стратегий
world_model:
  model_version: "2.0.0"
  min_valid_indicators: 4

  # Пороги классификации состояний
  toxic_microstructure:
    book_instability_min: 0.7
    aggressive_flow_min: 0.8
    spread_bps_min: 15.0

  liquidity_vacuum:
    spread_bps_critical: 50.0
    spread_bps_secondary: 20.0
    liquidity_ratio_min: 0.3

  exhaustion_spike:
    rsi_upper: 80.0
    rsi_lower: 20.0
    momentum_abs_min: 0.02

  fragile_breakout:
    bb_percent_b_upper: 0.95
    bb_percent_b_lower: 0.05
    volatility_5_min: 0.02
    book_imbalance_abs_min: 0.3

  compression:
    bb_bandwidth_max: 0.03
    atr_normalized_max: 0.01
    volatility_5_max: 0.01

  stable_trend:
    adx_min: 25.0
    rsi_lower: 40.0
    rsi_upper: 70.0

  chop_noise:
    adx_max: 20.0
    rsi_lower: 40.0
    rsi_upper: 60.0
    spread_bps_max: 20.0

  # Хрупкость (composite scoring)
  fragility:
    spread_stress_weight: 0.15
    book_instability_weight: 0.20
    volatility_accel_weight: 0.12
    liquidity_imbalance_weight: 0.10
    transition_instability_weight: 0.15
    vpin_toxicity_weight: 0.10

  # Гистерезис (сглаживание переходов между состояниями)
  hysteresis:
    enabled: true
    confirmation_ticks: 2
    min_dwell_ticks: 3

  # История состояний
  history:
    max_entries: 200
    tendency_lookback: 5

  # Персистентность (blend base + empirical)
  persistence:
    history_blend_weight: 0.3
    min_history_for_empirical: 10

  # Пригодность стратегий
  suitability:
    feedback_blend_weight: 0.3
    min_trades_for_feedback: 20
    hard_veto_threshold: 0.01

  # Обратная связь (feedback loop)
  feedback:
    enabled: true
    ema_alpha: 0.05

# ─── FUTURES TRADING (USDT-M) ──────────────────────────────────────────────
# Адаптивное управление кредитным плечом для фьючерсной торговли на Bitget
# Научная основа: Kelly Criterion + ATR-нормализация + режим рынка
# f* ≈ W - (1-W)/R; для WR=60%, R:R=1.0 → f*=0.20 → conservative leverage
futures:
  enabled: true
  product_type: "USDT-FUTURES"
  margin_coin: "USDT"
  margin_mode: "isolated"        # isolated: risk isolated per position

  # Adaptive leverage: engine computes optimal from regime × 6 multipliers
  # Bitget supports 50-125x depending on symbol; engine auto-clamps per symbol
  default_leverage: 20           # 20x — максимум для микро-счёта ($1.85 × 20x = $37 notional)
  max_leverage: 20               # Upper bound — capped for risk protection
  min_leverage: 10               # Micro-account: $9.80 × 10x = $98 > $5 min notional

  # Kelly-inspired regime-based leverage (Wilder ADX classification)
  # Trending (ADX>25): high Sharpe → higher leverage justified
  # Ranging (ADX 15-25): mean-reversion, lower Sharpe → conservative
  # Volatile (high ATR): wider stops → lower leverage for same risk
  leverage_trending: 20          # Strong trend = reliable direction → 20x (micro: $1.85×20 = $37)
  leverage_ranging: 15            # Micro-account: need ≥15x for proper notional
  leverage_volatile: 10           # High vol but micro-account: need $18+ notional for $5 min

  # Liquidation protection
  liquidation_buffer_pct: 5.0    # 5% buffer (safe margin from liquidation)

  # Funding rate (Bitget 8-hour rate, decimal: 0.0001 = 0.01%)
  # Threshold: 0.05% per 8h is elevated; at 20x leverage = 1% margin cost per 8h
  funding_rate_threshold: 0.0005 # 0.05% per 8h — start reducing leverage
  funding_rate_penalty: 0.5      # 50% penalty per threshold excess

  # Maintenance Margin
  maintenance_margin_rate: 0.004 # 0.4% Bitget standard

  # === Leverage Engine (адаптивный движок плеча) ===
  # Volatility breakpoints: откалиброваны для 1-min USDT-M candles
  # Эмпирическая калибровка: BTC 1-min ATR/price ≈ 0.0005-0.003 (calm→elevated)
  leverage_engine:
    vol_low_atr: 0.001               # ≤ 0.1% ATR/price → mult=1.0 (calm)
    vol_mid_atr: 0.003               # 0.3% → mult → 0.7 (moderate)
    vol_high_atr: 0.008              # 0.8% → mult → 0.4 (significant)
    vol_extreme_atr: 0.02            # 2.0% → mult → 0.2 (flash-crash)
    vol_floor: 0.10                  # Минимальный множитель волатильности
    conviction_min_mult: 0.40        # Множитель при нулевом conviction
    conviction_breakpoint: 0.70      # Порог для бонуса conviction
    conviction_max_mult: 1.30        # Макс бонус
    drawdown_floor_mult: 0.10        # Минимум при макс drawdown
    drawdown_halfpoint_pct: 10.0     # DD% при 50% снижении множителя
    ema_alpha: 0.3                   # EMA скорость реакции (~5-tick lookback)
    taker_fee_rate: 0.0006           # 0.06% Bitget futures taker
    min_leverage_change_delta: 2     # Минимальное изменение для API call

# ─── UNCERTAINTY ENGINE ─────────────────────────────────────────────────────
# Модуль оценки неопределённости — управляет size, threshold, execution mode
# Веса научно обоснованы для USDT-M futures scalping:
#   Execution+Data: высокий приоритет (microstructure = profit margin)
#   Regime: структурный фактор (Lopez de Prado classification)
#   ML: ensemble quality (Lakshminarayanan 2017)
uncertainty:
  # Веса измерений (сумма = 1.0)
  w_regime: 0.20
  w_signal: 0.15
  w_data_quality: 0.15
  w_execution: 0.15
  w_portfolio: 0.10
  w_ml: 0.10
  w_correlation: 0.05
  w_transition: 0.05
  w_operational: 0.05

  # Пороги уровней (равные квартили [0,1])
  threshold_low: 0.25            # Low → Moderate
  threshold_moderate: 0.50       # Moderate → High
  threshold_high: 0.75           # High → Extreme

  # Гистерезис (асимметричный: понижение инерционнее повышения)
  hysteresis_up: 0.03
  hysteresis_down: 0.05

  # EMA-сглаживание persistent score
  ema_alpha: 0.15

  # Лимиты size/threshold multiplier
  size_floor: 0.10              # Минимум 10% от номинала
  threshold_ceiling: 2.5        # Максимальный множитель порога

  # Cooldown: серия Extreme оценок → пауза
  consecutive_extreme_for_cooldown: 3
  cooldown_duration_s: 60        # 60 секунд
  consecutive_high_for_defensive: 3

  # Liquidity: порог для штрафа за асимметрию стакана
  liquidity_ratio_penalty_threshold: 0.5
