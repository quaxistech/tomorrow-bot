# Tomorrow Bot — production режим (РЕАЛЬНЫЕ ДЕНЬГИ!)
# ВНИМАНИЕ: изменения в этом файле немедленно влияют на торговлю!
# Все параметры риска установлены строже, чем в других режимах.
# Требуется явное подтверждение перед применением.

trading:
  mode: production
  initial_capital: 30.0             # Реальный капитал на аккаунте (~$30 USDT)

exchange:
  endpoint_rest: "https://api.bitget.com"
  endpoint_ws: "wss://ws.bitget.com/v2/ws/public"
  api_key_ref: "BITGET_API_KEY"
  api_secret_ref: "BITGET_API_SECRET"
  passphrase_ref: "BITGET_PASSPHRASE"
  timeout_ms: 3000

logging:
  level: "info"
  structured_json: true
  output_path: "logs/production.log"

metrics:
  enabled: true
  port: 9090
  path: "/metrics"

health:
  enabled: true
  port: 8080

risk:
  max_position_notional: 15.0      # До $15 на одну позицию (50% капитала)
  max_daily_loss_pct: 10.0         # Макс. $3 дневной убыток
  max_drawdown_pct: 20.0           # Макс. $6 просадка
  kill_switch_enabled: true
  # Расширенные параметры (desk-grade risk)
  max_strategy_daily_loss_pct: 5.0       # Макс дневной убыток одной стратегии (%)
  max_strategy_exposure_pct: 40.0        # Макс экспозиция одной стратегии (%)
  max_symbol_concentration_pct: 50.0     # Макс концентрация на один символ (%)
  max_same_direction_positions: 3        # Макс позиций в одном направлении
  regime_aware_limits_enabled: true      # Адаптация лимитов по режиму рынка
  stress_regime_scale: 0.5               # Множитель лимитов при стрессе
  trending_regime_scale: 1.2             # Множитель лимитов в тренде
  chop_regime_scale: 0.7                 # Множитель лимитов в боковике
  max_trades_per_hour: 10                # Макс сделок в час
  min_trade_interval_sec: 30.0           # Мин интервал между сделками (секунды)
  max_adverse_excursion_pct: 5.0         # Макс неблагоприятное отклонение (%)
  max_realized_daily_loss_pct: 5.0       # Макс реализованный дневной убыток (%)
  utc_cutoff_hour: -1                    # Час UTC остановки торговли (-1 = отключено)

# === Настройки движка принятия решений (высокий win-rate) ===
decision:
  min_conviction_threshold: 0.40    # Raised from 0.25: only trade strong signals (EMA-filtered strategies)
  conflict_dominance_threshold: 0.68 # Требуем более чёткое доминирование

# === Управление позицией (научные параметры) ===
trading_params:
  atr_stop_multiplier: 3.0          # Chandelier Exit 3.0 ATR — дать позициям дышать
  max_loss_per_trade_pct: 2.0       # Safety net: макс. 2% капитала на сделку
  breakeven_atr_threshold: 2.0      # Trailing после +2.0 ATR — не активировать на мини-профите
  partial_tp_atr_threshold: 4.0     # TP на 4×ATR → R:R = 4.0/3.0 = 1.33
  partial_tp_fraction: 0.5          # 50% позиции на частичном TP
  max_hold_loss_minutes: 35         # 35 мин: больше времени для отскока (20 мин отрезало TRADOOR)
  max_hold_absolute_minutes: 60     # 60 мин: дать тренду развиться
  order_cooldown_seconds: 120       # 2 мин между ордерами
  stop_loss_cooldown_seconds: 900   # 15 мин после стоп-лосса — не входить в тот же откат

adversarial_defense:
  enabled: true
  fail_closed_on_invalid_data: true
  auto_cooldown_on_veto: false
  auto_cooldown_severity: 0.92
  spread_explosion_threshold_bps: 80
  spread_normal_bps: 20
  min_liquidity_depth: 300
  book_imbalance_threshold: 0.82
  book_instability_threshold: 0.75
  toxic_flow_ratio_threshold: 2.5
  aggressive_flow_threshold: 0.92
  vpin_toxic_threshold: 0.82
  cooldown_duration_ms: 15000
  post_shock_cooldown_ms: 30000
  max_market_data_age_ns: 2000000000
  max_confidence_reduction: 0.75
  max_threshold_expansion: 1.5
  compound_threat_factor: 0.5
  cooldown_severity_scale: 1.5
  recovery_duration_ms: 10000
  recovery_confidence_floor: 0.6
  spread_velocity_threshold_bps_per_sec: 50.0
  # Adaptive baseline
  baseline_alpha: 0.01
  baseline_warmup_ticks: 200
  z_score_spread_threshold: 3.0
  z_score_depth_threshold: 3.0
  z_score_ratio_threshold: 3.0
  baseline_stale_reset_ms: 300000
  # Threat memory
  threat_memory_alpha: 0.15
  threat_memory_residual_factor: 0.3
  threat_escalation_ticks: 20
  threat_escalation_boost: 0.03
  # Depth asymmetry
  depth_asymmetry_threshold: 0.3
  # Cross-signal amplification
  cross_signal_amplification: 0.3
  # v4: Percentile scoring
  percentile_window_size: 500
  percentile_severity_threshold: 0.95
  # v4: Correlation matrix
  correlation_alpha: 0.02
  correlation_breakdown_threshold: 0.4
  # v4: Multi-timeframe baselines
  baseline_halflife_fast_ms: 30000
  baseline_halflife_medium_ms: 300000
  baseline_halflife_slow_ms: 1800000
  timeframe_divergence_threshold: 2.5
  # v4: Hysteresis (предотвращение chattering)
  hysteresis_enter_severity: 0.5
  hysteresis_exit_severity: 0.25
  hysteresis_confidence_penalty: 0.15
  # v4: Event sourcing / audit log
  audit_log_max_size: 10000

pair_selection:
  mode: auto                       # auto = автоматический выбор, manual = ручной список
  top_n: 3                         # 3 пары = ~$9 на каждую, больше прибыли за fee-drag
  min_volume_usdt: 500000          # Мин. 24ч объём (USDT)
  max_spread_bps: 50               # Макс. спред (базисных пунктов)
  rotation_interval_hours: 24      # Интервал ротации (часы)
  blacklist: "USDCUSDT,DAIUSDT,TUSDUSDT,USDPUSDT,FDUSDUSDT,EURCUSDT,PYUSDUSDT,BGBUSDT"

ai_advisory:
  enabled: true                      # AI Advisory включён
  timeout_ms: 1000                   # Таймаут обработки (мс)
  max_confidence_adjustment: 0.08    # Reduced: -0.15 was too punitive for micro-cap
  veto_severity_threshold: 0.95      # Вето только при экстремальных угрозах
  cooldown_ms: 10000                 # Кулдаун между advisory
  # Пороги детекторов (ослаблены для micro-cap)
  volatility_ratio_threshold: 3.5    # Micro-cap волатильность высокая — норма
  rsi_overbought: 85.0              # Мемкоины часто RSI>80
  rsi_oversold: 15.0                # Мемкоины часто RSI<20
  spread_anomaly_bps: 80.0          # Широкий спред нормален
  liquidity_ratio_min: 0.15         # Низкая ликвидность нормальна
  vpin_toxic_threshold: 0.85        # VPIN высокий на thin markets
  book_imbalance_threshold: 0.85    # Перекос стакана нормален
  book_instability_threshold: 0.85  # Нестабильность стакана нормальна
  # Hysteresis / ensemble / caution — настроено для micro-cap
  caution_severity_threshold: 0.65   # Выше обычного — мемкоины генерируют больше шума
  hysteresis_clear_ticks: 4          # 4 чистых тика для сброса (консервативно)
  ensemble_escalation_count: 3       # 3+ детектора → эскалация severity
  ensemble_escalation_bonus: 0.12    # Небольшой бонус: не хотим лишних вето
  caution_size_multiplier: 0.4       # Режим осторожности: 40% размера позиции
  use_severity_weighted_adjustment: true

# ── Исполнительная альфа ──────────────────────────────────────────────────────
execution_alpha:
  # Базовые пороги
  max_spread_bps_passive: 12.0          # Production: чуть строже (BTC ликвидный)
  max_spread_bps_any: 40.0
  adverse_selection_threshold: 0.65     # Строже в production
  urgency_passive_threshold: 0.5
  urgency_aggressive_threshold: 0.8
  large_order_slice_threshold: 0.08     # Нарезать при 8% от глубины
  # VPIN
  vpin_toxic_threshold: 0.65
  vpin_weight: 0.40
  # Дисбаланс стакана
  imbalance_favorable_threshold: 0.30
  imbalance_unfavorable_threshold: 0.30
  # Лимитная цена
  use_weighted_mid_price: true
  limit_price_passive_bps: 3.0
  # Срочность
  urgency_cusum_boost: 0.15
  urgency_tod_weight: 0.10
  # Вероятность заполнения
  min_fill_probability_passive: 0.25
  # PostOnly условия (нулевая комиссия)
  postonly_spread_threshold_bps: 4.0
  postonly_urgency_max: 0.30
  postonly_adverse_max: 0.30

# ── Opportunity Cost ──────────────────────────────────────────────────────────
opportunity_cost:
  min_net_expected_bps: 5.0              # Production: строже — фильтруем слабые сигналы
  execute_min_net_bps: 20.0              # Порог для немедленного исполнения (бп)
  high_exposure_threshold: 0.70          # Production: осторожнее (70% вместо 75%)
  high_exposure_min_conviction: 0.70     # Мин conviction при высокой экспозиции
  max_symbol_concentration: 0.25         # Макс 25% капитала на символ
  max_strategy_concentration: 0.35       # Макс 35% капитала на стратегию
  capital_exhaustion_threshold: 0.85     # Production: оставляем 15% резерв
  weight_conviction: 0.35               # Вес conviction в скоринге
  weight_net_edge: 0.35                 # Вес чистого edge
  weight_capital_efficiency: 0.15       # Вес эффективности капитала
  weight_urgency: 0.15                  # Вес срочности
  conviction_to_bps_scale: 120.0        # conviction 1.0 → 120 бп ожидаемого дохода
  upgrade_min_edge_advantage_bps: 15.0  # Production: нужно 15 бп преимущество для замены
  drawdown_penalty_scale: 0.5           # +0.5 к порогу за каждые 5% просадки

# ── Regime Classification ─────────────────────────────────────────────────────
# Настройки классификатора рыночных режимов: пороги, гистерезис, политика
regime:
  # Тренд
  trend_adx_strong: 30.0            # ADX выше этого = сильный тренд
  trend_adx_weak_min: 18.0          # Нижняя граница слабого тренда
  trend_adx_weak_max: 30.0          # Верхняя граница слабого тренда
  trend_rsi_bias: 50.0              # RSI выше = бычий, ниже = медвежий

  # Возврат к среднему
  mr_rsi_overbought: 70.0           # RSI порог перекупленности
  mr_rsi_oversold: 30.0             # RSI порог перепроданности
  mr_adx_max: 25.0                  # Макс ADX для mean-reversion

  # Волатильность
  vol_bb_expansion: 0.06            # BB bandwidth для расширения волатильности
  vol_bb_compression: 0.02          # BB bandwidth для сжатия
  vol_atr_expansion: 0.02           # Нормализованный ATR для расширения
  vol_adx_compression_max: 20.0     # Макс ADX для компрессии

  # Стресс / аномалии
  stress_rsi_extreme_high: 85.0     # RSI аномально высокий
  stress_rsi_extreme_low: 15.0      # RSI аномально низкий
  stress_obv_extreme: 2.0           # OBV нормализованный — аномалия
  stress_aggressive_flow: 0.75      # Порог токсичного потока
  stress_spread_toxic_bps: 15.0     # Spread токсичности (bps)
  stress_book_instability: 0.6      # Нестабильность книги ордеров
  stress_spread_bps: 30.0           # Spread стресса (bps)
  stress_liquidity_ratio: 3.0       # Коэффициент стресса ликвидности

  # Chop / боковик
  chop_adx_max: 18.0                # ADX ниже этого = Chop

  # Гистерезис / переходная политика
  transition_confirmation_ticks: 3  # Тиков для подтверждения смены режима
  transition_min_confidence: 0.55   # Мин confidence для смены
  transition_inertia_alpha: 0.15    # EMA-сглаживание перехода
  transition_dwell_ticks: 5         # Мин тиков в режиме перед сменой

  # Уверенность / стабильность
  confidence_base: 0.5              # Базовая уверенность
  confidence_data_quality_weight: 0.2
  confidence_max_indicators: 6
  confidence_anomaly: 0.9
  stability_same_regime: 0.9
  stability_first_classification: 0.5
