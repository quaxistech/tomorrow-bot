# Tomorrow Bot — теневой режим (Shadow Mode)
# Система производит все расчёты и генерирует сигналы,
# но не отправляет реальные ордера на биржу.
# Используется для верификации стратегий в production-условиях.

trading:
  mode: shadow

exchange:
  endpoint_rest: "https://api.bitget.com"
  endpoint_ws: "wss://ws.bitget.com/v2/ws/public"
  api_key_ref: "BITGET_API_KEY"
  api_secret_ref: "BITGET_API_SECRET"
  passphrase_ref: "BITGET_PASSPHRASE"
  timeout_ms: 5000

logging:
  level: "info"
  structured_json: true
  output_path: "/var/log/tomorrow-bot/shadow.log"

metrics:
  enabled: true
  port: 9091
  path: "/metrics"

health:
  enabled: true
  port: 8081

risk:
  max_position_notional: 500.0
  max_daily_loss_pct: 2.0
  max_drawdown_pct: 5.0
  kill_switch_enabled: true

adversarial_defense:
  enabled: true
  fail_closed_on_invalid_data: true
  auto_cooldown_on_veto: true
  auto_cooldown_severity: 0.85
  spread_explosion_threshold_bps: 60
  spread_normal_bps: 15
  min_liquidity_depth: 250
  book_imbalance_threshold: 0.75
  book_instability_threshold: 0.65
  toxic_flow_ratio_threshold: 1.8
  aggressive_flow_threshold: 0.8
  vpin_toxic_threshold: 0.72
  cooldown_duration_ms: 30000
  post_shock_cooldown_ms: 60000
  max_market_data_age_ns: 2000000000
  max_confidence_reduction: 0.75
  max_threshold_expansion: 1.5
  compound_threat_factor: 0.5
  cooldown_severity_scale: 1.5
  recovery_duration_ms: 10000
  recovery_confidence_floor: 0.6
  spread_velocity_threshold_bps_per_sec: 50.0
  # Adaptive baseline
  baseline_alpha: 0.01
  baseline_warmup_ticks: 200
  z_score_spread_threshold: 3.0
  z_score_depth_threshold: 3.0
  z_score_ratio_threshold: 3.0
  baseline_stale_reset_ms: 300000
  # Threat memory
  threat_memory_alpha: 0.15
  threat_memory_residual_factor: 0.3
  threat_escalation_ticks: 5
  threat_escalation_boost: 0.1
  # Depth asymmetry
  depth_asymmetry_threshold: 0.3
  # Cross-signal amplification
  cross_signal_amplification: 0.3
  # v4: Percentile scoring
  percentile_window_size: 500
  percentile_severity_threshold: 0.95
  # v4: Correlation matrix
  correlation_alpha: 0.02
  correlation_breakdown_threshold: 0.4
  # v4: Multi-timeframe baselines
  baseline_halflife_fast_ms: 30000
  baseline_halflife_medium_ms: 300000
  baseline_halflife_slow_ms: 1800000
  timeframe_divergence_threshold: 2.5
  # v4: Hysteresis
  hysteresis_enter_severity: 0.5
  hysteresis_exit_severity: 0.25
  hysteresis_confidence_penalty: 0.15
  # v4: Event sourcing
  audit_log_max_size: 10000

pair_selection:
  mode: auto
  top_n: 5
  min_volume_usdt: 500000
  max_spread_bps: 50
  rotation_interval_hours: 24
  blacklist: ""

ai_advisory:
  enabled: true                      # AI Advisory включён
  timeout_ms: 2000                   # Таймаут обработки (мс)
  max_confidence_adjustment: 0.5     # Макс. суммарная корректировка уверенности
  veto_severity_threshold: 0.8       # Severity >= X → рекомендация вето
  cooldown_ms: 5000                  # Кулдаун между одинаковыми рекомендациями (мс)
  # Пороги детекторов
  volatility_ratio_threshold: 3.0    # vol5/vol20 ratio для аномалии
  rsi_overbought: 85.0              # RSI > X → перекупленность
  rsi_oversold: 15.0                # RSI < X → перепроданность
  spread_anomaly_bps: 50.0          # Спред > X bps → аномалия
  liquidity_ratio_min: 0.3          # Ликвидность < X → предупреждение
  vpin_toxic_threshold: 0.7         # VPIN > X → токсичный поток
  book_imbalance_threshold: 0.7     # |imbalance| > X → перекос стакана
  book_instability_threshold: 0.7   # instability > X → нестабильный стакан
  # Hysteresis / ensemble / caution
  caution_severity_threshold: 0.55
  hysteresis_clear_ticks: 3
  ensemble_escalation_count: 3
  ensemble_escalation_bonus: 0.15
  caution_size_multiplier: 0.5
  use_severity_weighted_adjustment: true

# ── Исполнительная альфа ──────────────────────────────────────────────────────
execution_alpha:
  max_spread_bps_passive: 15.0
  max_spread_bps_any: 50.0
  adverse_selection_threshold: 0.7
  urgency_passive_threshold: 0.5
  urgency_aggressive_threshold: 0.8
  large_order_slice_threshold: 0.10
  vpin_toxic_threshold: 0.65
  vpin_weight: 0.40
  imbalance_favorable_threshold: 0.30
  imbalance_unfavorable_threshold: 0.30
  use_weighted_mid_price: true
  limit_price_passive_bps: 3.0
  urgency_cusum_boost: 0.15
  urgency_tod_weight: 0.10
  min_fill_probability_passive: 0.25
  postonly_spread_threshold_bps: 4.5
  postonly_urgency_max: 0.35
  postonly_adverse_max: 0.35

# ── Opportunity Cost ──────────────────────────────────────────────────────────
opportunity_cost:
  min_net_expected_bps: 0.0
  execute_min_net_bps: 15.0
  high_exposure_threshold: 0.75
  high_exposure_min_conviction: 0.65
  max_symbol_concentration: 0.30
  max_strategy_concentration: 0.40
  capital_exhaustion_threshold: 0.90
  weight_conviction: 0.35
  weight_net_edge: 0.35
  weight_capital_efficiency: 0.15
  weight_urgency: 0.15
  conviction_to_bps_scale: 120.0
  upgrade_min_edge_advantage_bps: 10.0
  drawdown_penalty_scale: 0.3

# ── Regime Classification ─────────────────────────────────────────────────────
# Настройки классификатора рыночных режимов: пороги, гистерезис, политика
regime:
  # Тренд
  trend_adx_strong: 30.0            # ADX выше этого = сильный тренд
  trend_adx_weak_min: 18.0          # Нижняя граница слабого тренда
  trend_adx_weak_max: 30.0          # Верхняя граница слабого тренда
  trend_rsi_bias: 50.0              # RSI выше = бычий, ниже = медвежий

  # Возврат к среднему
  mr_rsi_overbought: 70.0           # RSI порог перекупленности
  mr_rsi_oversold: 30.0             # RSI порог перепроданности
  mr_adx_max: 25.0                  # Макс ADX для mean-reversion

  # Волатильность
  vol_bb_expansion: 0.06            # BB bandwidth для расширения волатильности
  vol_bb_compression: 0.02          # BB bandwidth для сжатия
  vol_atr_expansion: 0.02           # Нормализованный ATR для расширения
  vol_adx_compression_max: 20.0     # Макс ADX для компрессии

  # Стресс / аномалии
  stress_rsi_extreme_high: 85.0     # RSI аномально высокий
  stress_rsi_extreme_low: 15.0      # RSI аномально низкий
  stress_obv_extreme: 2.0           # OBV нормализованный — аномалия
  stress_aggressive_flow: 0.75      # Порог токсичного потока
  stress_spread_toxic_bps: 15.0     # Spread токсичности (bps)
  stress_book_instability: 0.6      # Нестабильность книги ордеров
  stress_spread_bps: 30.0           # Spread стресса (bps)
  stress_liquidity_ratio: 3.0       # Коэффициент стресса ликвидности

  # Chop / боковик
  chop_adx_max: 18.0                # ADX ниже этого = Chop

  # Гистерезис / переходная политика
  transition_confirmation_ticks: 3  # Тиков для подтверждения смены режима
  transition_min_confidence: 0.55   # Мин confidence для смены
  transition_inertia_alpha: 0.15    # EMA-сглаживание перехода
  transition_dwell_ticks: 5         # Мин тиков в режиме перед сменой

  # Уверенность / стабильность
  confidence_base: 0.5              # Базовая уверенность
  confidence_data_quality_weight: 0.2
  confidence_max_indicators: 6
  confidence_anomaly: 0.9
  stability_same_regime: 0.9
  stability_first_classification: 0.5
